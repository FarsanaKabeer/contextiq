<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ContextIQ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body id="popup-body">
  <div id="popup-header">⚡ ContextIQ</div>
  <div id="popup-content">
    <label>Anthropic API Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button id="save-key">Save Key</button>
    <hr>
    <label>Plan</label>
    <select id="tier-select">
      <option value="free">Free (Haiku)</option>
      <option value="pro">Pro (Sonnet)</option>
    </select>
    <button id="save-tier">Save</button>
    <hr>
    <p id="status-msg"></p>
    <button id="open-panel-btn">Open Panel on This Page ↗</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
